<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorite Books</title>
</head>
<body>
    <h1>Favorite Books</h1>

    <!-- Nav buttons -->
     <button id="btnViewBooks">View Books</button>
     <button id="btnAddBook">Add Book</button>

     <!-- Book List -->
      <div id="bookListView">
        <h2>Book List</h2>
        <ul id="bookList"></ul>
    </div>

    <!-- Add Book Form -->
     <div id="addBookView" style="display: none;">
        <h2>Add a New Book</h2>
        <label>Title: <input type="text" id="titleInput"></label><br><br>
        <label>Author: <input type="text" id="authorInput"></label><br><br>
        <button id="btnSubmitBook">Add Book</button>
    </div>
    

    <script>
        const jsonString = `[
         { "title": "1984", "author": "George Orwell" },
        { "title": "To Kill a Mockingbird", "author": "Harper Lee" },
        { "title": "The Great Gatsby", "author": "F. Scott Fitzgerald" },
        { "title": "Pride and Prejudice", "author": "Jane Austen" },
        { "title": "The Hobbit", "author": "J.R.R. Tolkien" }
         ]`;

         let books = JSON.parse(jsonString);
         console.log(books);
         const bookList = document.querySelector('#bookList');
         for (let book of books) {
            const li = document.createElement('li');
            li.textContent = book.title + ' by ' + book.author;
            bookList.appendChild(li);
         }

         // Get view element
         const bookListView = document.querySelector('#bookListView');
         const addBookView = document.querySelector('#addBookView');

         //
         // Get buttons
         const btnViewBooks = document.querySelector('#btnViewBooks');
         const btnAddBook = document.querySelector('#btnAddBook');

         //Function to show Book List view

         function showBookListView() {
            bookListView.style.display = 'block';
            addBookView.style.display = 'none';
         }

         //  Function to show Add Book view
         function showAddBookView() {
            bookListView.style.display = 'none';
            addBookView.style.display = 'block';
         }

         // Add event listeners to buttons
         btnViewBooks.addEventListener('click', showBookListView);
         btnAddBook.addEventListener('click', showAddBookView);

         // function to make Add book usable

         const titleInput = document.querySelector('#titleInput');
         const authorInput = document.querySelector('#authorInput');
         const btnSubmitBook = document.querySelector('#btnSubmitBook');

         btnSubmitBook.addEventListener('click', function() {
            // Get value from Input
            const newTitle = titleInput.value;
            const newAuthor = authorInput.value;

            // Create new book and add to array list
            const newBook = {
                title: newTitle,
                author: newAuthor
            
            };
            book.push(newBook);

            // Clear form

            titleInput.value = '';
            authorInput.value = '';

            // Switch to list view and show updated list
            displayBooks();
            showBookListView();
        });


    </script>
</body>
</html>
